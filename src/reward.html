<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tukar Reward - Bali Resik</title>
    
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="./css/output.css" rel="stylesheet">
</head>
<body class="bg-white text-gray-900 overflow-x-hidden">

    <header></header>

    <main>
        <section class="relative bg-[#153C35] pt-48 pb-32 px-6 lg:px-36 rounded-b-[50px] overflow-hidden">
            <div class="relative z-10 max-w-4xl animate-slideInLeft">
                <span class="text-[#569785] font-bold tracking-widest uppercase text-sm mb-4 block">Apresiasi Kontribusi</span>
                <h1 class="text-5xl lg:text-7xl font-bold text-white leading-tight mb-8">
                    Tukar Poinmu dengan <span class="text-[#569785]">Reward</span>.
                </h1>
                <p class="text-white/70 text-lg leading-relaxed max-w-2xl">
                    Pilih berbagai hadiah menarik sebagai bentuk terima kasih kami atas dedikasimu menjaga kebersihan lingkungan Bali.
                </p>
            </div>
            <div class="absolute top-0 right-0 w-1/3 h-full bg-[#1F7A6B]/10 blur-[120px] rounded-full -mr-20 -mt-20"></div>
        </section>

        <section class="py-24 px-6 lg:px-36">
            <div class="flex flex-col md:flex-row justify-between items-center mb-16 gap-6 animate-slideInUp">
                <div class="bg-gray-50 px-8 py-4 rounded-2xl border border-gray-100 flex items-center gap-4">
                    <span class="text-gray-400 font-medium">Poin Kamu:</span>
                    <span class="text-2xl font-bold text-[#1F7A6B]">2,450 XP</span>
                </div>
                <div class="flex gap-4">
                    <button class="px-6 py-2 rounded-full bg-[#153C35] text-white font-medium">Semua</button>
                    <button class="px-6 py-2 rounded-full bg-gray-50 text-gray-400 hover:bg-gray-100 transition-colors">Voucher</button>
                    <button class="px-6 py-2 rounded-full bg-gray-50 text-gray-400 hover:bg-gray-100 transition-colors">Merchandise</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 animate-slideInUp animate-delay-200">
                
                <div class="group bg-white rounded-[40px] border border-gray-100 overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500">
                    <div class="aspect-video bg-gray-100 relative overflow-hidden">
                        <div class="absolute inset-0 flex items-center justify-center text-gray-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <span class="absolute top-6 left-6 bg-[#1F7A6B] text-white px-4 py-1.5 rounded-full font-bold text-sm shadow-lg">500 Poin</span>
                    </div>
                    <div class="p-8">
                        <h3 class="text-xl font-bold text-[#153C35] mb-2">Voucher Belanja Indomaret</h3>
                        <p class="text-gray-400 text-sm mb-6 leading-relaxed">Voucher belanja senilai Rp 50.000 untuk kebutuhan harianmu.</p>
                        <button class="w-full py-4 bg-gray-50 text-[#153C35] group-hover:bg-[#1F7A6B] group-hover:text-white rounded-2xl font-bold transition-all duration-300">Tukar Sekarang</button>
                    </div>
                </div>

                </div>
        </section>
    </main>

    <footer></footer>

    <script src="../src/js/components.js"></script>
    <script src="../src/js/navbar.js"></script>
    <script src="../src/js/auth-modal.js"></script>
    <script>
        initLayout('type2');
        initNavbarScroll('type2'); 
    </script>
</body>
</html>
